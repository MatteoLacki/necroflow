# Necroalchemy parameter grid
#
# Keys ending in __grid are expanded into all combinations.
# This produces 6 pipelines: 3 words × 2 repetition counts.
#
# Run with:
#   necroflow \
#     --nodes-dir   /tmp/necroalchemy_nodes \
#     --results-dir /tmp/necroalchemy_results \
#     examples/necroalchemy_grid.toml

".pipeline" = "examples/necroalchemy_factory.py:factory"

word__grid = ["necroflow", "snakemake", "python"]
n__grid    = [2, 5]
